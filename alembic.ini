# Alembic configuration file
# This file is in the format of the PEP 0263 encoding

[alembic]
# Path to migration scripts directory
script_location = alembic

# Template used to generate migration file names
file_template = %%(rev)s_%%(slug)s

# Logging configuration
sqlalchemy.url = postgresql://mind_user:mind_password@localhost/mind_db

# System to use for ordering migrations ('migration' or 'timestamp')
version_path_separator = :

# Logging configuration
[loggers]
keys = root,sqlalchemy.engine

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy.engine]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
