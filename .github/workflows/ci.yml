name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 137_Cmspelo
          POSTGRES_DB: mind
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create test database
        run: |
          PGPASSWORD=137_Cmspelo psql -h localhost -U postgres -c "CREATE DATABASE mind_test;"

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 app/ tests/ --max-line-length=100 --count --statistics

      - name: Check formatting with black
        run: |
          pip install black
          black --check --diff app/ tests/ --line-length=100

      - name: Type check with mypy
        run: |
          pip install mypy pydantic pydantic-settings
          mypy app/ --ignore-missing-imports
        continue-on-error: true

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v --tb=short -m "not slow" --cov=app --cov-report=term --cov-report=xml
        env:
          DATABASE_URL: postgresql://postgres:137_Cmspelo@localhost:5432/mind
          JWT_SECRET_KEY: ci-test-jwt-secret-key-not-for-production
          ENCRYPTION_KEY: ci-test-encryption-key-32-bytes-long!!

      - name: Run integration tests
        run: |
          pytest tests/integration/ -v --tb=short --cov=app --cov-report=term --cov-report=xml --cov-append
        env:
          DATABASE_URL: postgresql://postgres:137_Cmspelo@localhost:5432/mind
          JWT_SECRET_KEY: ci-test-jwt-secret-key-not-for-production
          ENCRYPTION_KEY: ci-test-encryption-key-32-bytes-long!!

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
