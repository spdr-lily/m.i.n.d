services:
  postgres:
    image: postgres:16-alpine
    container_name: mind-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-137_Cmspelo}
      POSTGRES_DB: mind
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mind"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mind-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: mind-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - mind-network
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: mind-api
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-137_Cmspelo}@postgres:5432/mind
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      DEBUG: "false"
      CORS_ORIGINS: http://localhost:8000
      PORT: "8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mind-network
    restart: unless-stopped

  airflow:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: mind-airflow
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql://postgres:${POSTGRES_PASSWORD:-137_Cmspelo}@postgres:5432/mind
      AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY:-d6Vef9S0TtL7X8WzQ3R1pA5bC2nM4kL9jH7gF3dS6s=}
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - airflow_logs:/opt/airflow/logs
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mind-network
    restart: unless-stopped
    command: >
      bash -c "
        airflow db init &&
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@mind.example.com 2>/dev/null;
        airflow scheduler & airflow webserver
      "

  spark:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    container_name: mind-spark
    environment:
      SPARK_NO_DAEMONIZE: "true"
    ports:
      - "9090:8080"
      - "7077:7077"
    networks:
      - mind-network
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: mind-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@mind.example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - mind-network
    restart: unless-stopped
    profiles:
      - tools

  caddy:
    image: caddy:2
    container_name: mind-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./certificates:/etc/certs
    depends_on:
      - api
    networks:
      - mind-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  airflow_logs:

networks:
  mind-network:
    driver: bridge
