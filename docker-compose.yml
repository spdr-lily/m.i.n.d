version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mind-postgres
    environment:
      POSTGRES_USER: mind_user
      POSTGRES_PASSWORD: mind_password
      POSTGRES_DB: mind_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mind_user -d mind_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mind-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: mind-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@mind.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - mind-network

volumes:
  postgres_data:

networks:
  mind-network:
    driver: bridge
